name: meuplanoai

services:
  backend:
    container_name: backend_dev
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./backend/src:/app/src
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    env_file:
      - ./backend/.env.development

  backend-test:
    container_name: backend-test
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: test
    env_file:
      - ./backend/.env.development