server {
  listen 80;
  server_name _;

  # Diretório onde estão os arquivos estáticos (copiados no Dockerfile).
  root /usr/share/nginx/html;
  index index.html;

  location / {
    # Tenta servir o arquivo/diretório pedido; se não existir, devolve o
    # index.html (deixando o roteamento para a aplicação no navegador).
    try_files $uri $uri/ /index.html;
  }
}
